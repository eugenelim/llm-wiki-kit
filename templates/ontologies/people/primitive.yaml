description: >-
  Entity-node role folder (RFC-0009 §C). Seeds `wiki/people/` with a README and
  a `genre: moc` `_index.md` map. People, organizations, vendors, and customers
  are all node pages here, distinguished by the `subtype` facet — never by a
  separate folder. Content-type ingesters (meeting, interview, customer-feedback,
  etc.) stub and link node pages here on first reference.
