name: meal-planning
kind: operation
version: 0.1.0
description: >-
  Weekly family meal plan with shopping list. Reads the recipe pages in
  `library/` (`--subtype recipe`), the dietary-notes reference page, and
  last week's plan; writes one plan page per week under
  `outputs/meal-plans/`. Requires the `recipe` content-type because the
  v0.1 planner picks from recipe pages; `library/` is pulled in
  transitively.
requires:
  - recipe
contributes_to: []
