name: onboarding-pack
kind: operation
version: 0.1.0
description: >-
  Produce a one-page onboarding briefing for a new account-team member or
  project contributor, scoped to a named customer or project. Walks the
  customer node (`wiki/people/`) and project hub (`wiki/efforts/projects/`)
  plus recent decisions and customer-feedback in `wiki/library/` to assemble
  the durable context a newcomer needs in their first week.
requires:
  - people
  - projects
  - decision
  - customer-feedback
contributes_to: []
