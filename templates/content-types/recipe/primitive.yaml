name: recipe
kind: content-type
version: 0.1.0
description: >-
  Recipe page type. Ships an ingester skill (capture a recipe from a URL,
  photo, or pasted text), a page template, and the schema contributions
  that make `type: recipe` valid with recipe-scoped fields. Pages land
  under `wiki/food/`; the `meal-planning` operation reads the library.
requires:
  - food
contributes_to:
  - file: frontmatter.schema.yaml
    region: types
  - file: frontmatter.schema.yaml
    region: fields
