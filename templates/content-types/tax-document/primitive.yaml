name: tax-document
kind: content-type
version: 0.1.0
description: >-
  Tax-document page type. Ships an ingester skill (capture a W-2, 1099,
  1098, K-1, brokerage year-end statement, or tax-prep summary), a page
  template, and the schema contributions that make `genre: record, subtype: tax`
  valid with tax-scoped fields. Issuer nodes live under `wiki/people/`
  (`type: vendor`); the tax-document page itself homes in `wiki/library/`.
  SSNs are redacted in body before write — the raw PDF stays in raw/.
requires:
  - people
  - library
routing:
  filename_patterns:
    - "W-2*"
    - "W2-*"
    - "1099-*"
    - "K-1*"
    - "1098-*"
    - "form-1040*"
    - "*-tax-summary*"
contributes_to:
  - file: frontmatter.schema.yaml
    region: subtype
  - file: frontmatter.schema.yaml
    region: fields
