name: receipt
kind: content-type
version: 0.1.0
description: >-
  Receipt page type. Ships an ingester skill (capture a receipt photo,
  PDF, statement entry, or emailed receipt), a page template, and the
  schema contributions that make `genre: record, subtype: receipt` valid with receipt-
  scoped fields. Vendor nodes are stubbed on first reference under
  `wiki/people/` (`subtype: vendor`); warranty and tax-relevant items surface
  as flags. The receipt page itself homes in `wiki/library/`.
requires:
  - people
  - library
routing:
  filename_patterns:
    - "*receipt*"
    - "*-receipt-*"
contributes_to:
  - file: frontmatter.schema.yaml
    region: subtype
  - file: frontmatter.schema.yaml
    region: fields
