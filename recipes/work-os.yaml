# Work-OS recipe — vault shape for a professional knowledge base.
#
# Minimal for Task 9 (RFC-0001): only ``core`` is referenced. The
# work-os primitives — ``projects``, ``domains``, ``customers``
# ontologies plus ``stakeholder-update``, ``decision``, ``interview``
# content-types, and ``stakeholder-map-refresh`` /
# ``action-item-rollup`` / ``status-synthesis`` operations — ship in
# Task 14 and will be added to ``primitives:`` then. Keeping the list
# minimal here lets Task 10's ``wiki init`` end-to-end test resolve the
# recipe against the live catalog without coordinating with Task 14.
#
# Reading this in the future: the rule is "every primitive named here
# must already exist in the catalog when this recipe lands on main."
# Reach for ``wiki add`` for opt-in extensions on top of the baseline.
name: work-os
version: 0.1.0
description: >-
  Work knowledge base for a professional managing customers, projects,
  and recurring deliverables. Expands in Task 14.
primitives:
  - core
variables:
  recipe_name: work-os
