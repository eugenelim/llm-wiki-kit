# Family recipe — vault shape for a household.
#
# Minimal for Task 9 (RFC-0001): only ``core`` is referenced. The family
# audience's intended primitives — ``food``, ``medical``, ``trips``,
# ``vendors`` ontologies plus their content-types and operations — ship
# in Task 13 and will be added to ``primitives:`` then. Keeping the list
# minimal here lets Task 10's ``wiki init`` end-to-end test resolve the
# recipe against the live catalog without coordinating with Task 13.
#
# Reading this in the future: the rule is "every primitive named here
# must already exist in the catalog when this recipe lands on main."
# Reach for ``wiki add`` for opt-in extensions on top of the baseline.
name: family
version: 0.1.0
description: >-
  Home knowledge base for a household: people, food, medical, trips, and
  the operations that keep them coordinated. Expands in Task 13.
primitives:
  - core
variables:
  recipe_name: family
