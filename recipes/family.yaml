# Family recipe — vault shape for a household.
#
# Lays the household's pages over the four role folders (RFC-0009 §C):
# entity nodes in `people/`, bounded efforts (trips, cases) under
# `efforts/`, capture (meetings, recipes, receipts, tax, medical records)
# in `library/`, and synthesis in `atlas/`. The recipe loader resolves
# `requires:` transitively, so the content-types pull their role folders
# in — but `atlas`, `library`, and `efforts` are listed explicitly so the
# four-role floor holds regardless of which content-types ship (the
# entity-kind ontologies `food`/`medical`/`vendors` are gone; their pages
# are `subtype`s within the role folders).
#
# Conventions: alphabetical, one primitive per line, no `core`
# (always installed). Adding a primitive here is a recipe-level change;
# adding a content-type at the catalog level is a primitive-level change.
name: family
version: 0.2.0
description: >-
  Home knowledge base for a household: people, recipes, medical records,
  trips, receipts, and the operations that keep them coordinated (meal
  planning, trip prep, follow-up tracking, medical summaries, weekly digest).
primitives:
  - action-item
  - atlas
  - care-coordinator
  - efforts
  - follow-up-tracker
  - household-manager
  - library
  - meal-planning
  - medical-record
  - medical-summary
  - meeting
  - people
  - receipt
  - recipe
  - tax-document
  - trip-doc
  - trip-planner
  - trip-prep
  - trips
  - weekly-digest
variables:
  recipe_name: family
# Default agent bindings (RFC-0004 / wiki-agents PR-7). Each binding's
# ``runs:`` list names operations the recipe's ``primitives:`` closure
# already installs — the PR-3 closure-walk validator (CT-3/4/5) enforces
# this at recipe-load.
agents:
  household-manager:
    runs:
      - weekly-digest
      - meal-planning
      - follow-up-tracker
  trip-planner:
    runs:
      - trip-prep
  care-coordinator:
    runs:
      - medical-summary
