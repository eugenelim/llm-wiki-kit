# Personal recipe — vault shape for one individual.
#
# The personal recipe is *composition*, not invention. Every primitive
# named here ships from `core/`, Task 11, Task 13 (family-recipe
# primitives), Task 14 (work-os-recipe primitives), or this task's
# `identity` ontology. If you reach a point where the personal audience
# needs something neither family nor work-os ships, write a follow-up
# task — don't sneak a new content-type or operation into this recipe.
#
# Closure notes (for the next maintainer):
#
# * `identity` (Task 15, this PR) — one durable page about the vault's
#   owner. Personal-only; family/work-os do not ship it.
# * `people`, `meeting`, `weekly-digest` (Task 11) — every audience
#   needs a people graph, meeting notes, and a weekly summary. Pulled
#   transitively too, but listing each leaf makes the intent explicit.
# * `action-item`, `follow-up-tracker` (Task 13) — every audience
#   needs follow-up tracking. The personal cadence is lighter than a
#   household's, but the surface is the same.
# * `atlas`, `library`, `efforts` (RFC-0009 role folders) — listed
#   explicitly so the four-role floor holds: synthesis in `atlas/`,
#   capture in `library/`, bounded efforts under `efforts/`. `library`
#   and `efforts` also arrive transitively (via `recipe`/`decision` and
#   via `trips`), but the explicit listing is the guarantee.
# * `recipe`, `meal-planning` (Task 13) — cooking is a first-class
#   personal use case. Recipe pages home in `library/` (the `food`
#   ontology is gone — a recipe is a `genre: reference` capture).
# * `trips`, `trip-doc`, `trip-prep` (Task 13) — personal travel. A trip
#   is a folder-mode container under `efforts/trips/`; `trips` is
#   transitive via `trip-doc`, listed for readability.
# * `decision` (Task 14) — durable record of "what I chose, why, and
#   what I considered," captured in `library/`. Useful for personal
#   decisions (job offers, moves, big purchases) as well as work-os ones,
#   and ships without any work-OS-shaped dependencies (no `projects`).
# * `content-studio`, `planning` (RFC-0008 workspace lenses) — the two
#   default lenses that turn the personal vault into a multi-area
#   knowledge bank. `content-studio` is a *membership* lens (notes whose
#   `workspaces:` frontmatter contains `content-studio` — drafting and
#   publishing). `planning` is a *cross-cutting* lens (no membership
#   filter; it surveys every note by status for weekly planning). Both
#   reference the existing `personal-coordinator` agent and surface
#   operations the closure already installs; per RFC-0008's Model A a
#   lens never mints an agent→operation binding, so the `agents:` block
#   below is unchanged. Each lens's `requires:` (`personal-coordinator`
#   for content-studio; `follow-up-tracker`/`personal-coordinator`/
#   `weekly-digest` for planning) is already in this closure.
#
# Deliberately excluded from the default closure:
#
# * `medical-record` / `medical-summary` + the `cases` registry
#   (Task 13) — medical data is sensitive enough that opt-in via
#   `wiki add` is the safer default. A user who wants them runs
#   `wiki add content-type:medical-record` (which pulls the `cases`
#   container) and the summary operation as needed; the personal recipe
#   should not assume they want medical records in their default shape.
# * `receipt` + `tax-document` (Task 13) — household-shape primitives.
#   The personal audience is one individual; receipt / tax tracking is a
#   household concern (joint expenses, shared service providers) that
#   doesn't fit the one-person framing.
# * `projects` registry + work-OS content-types (`stakeholder-update`,
#   `vendor-contract`, `customer-feedback`, `interview`) + work-OS
#   operations (`stakeholder-map-refresh`, `action-item-rollup`,
#   `renewal-reminders`, `onboarding-pack`, `status-synthesis`) —
#   work-OS shaped. The personal recipe is not a single-operator work
#   vault; users who want both run two vaults.
#
# Conventions: alphabetical, one primitive per line, no `core`
# (always installed). Adding a primitive here is a recipe-level change;
# adding a content-type at the catalog level is a primitive-level change.
name: personal
version: 0.2.0
description: >-
  Personal knowledge base for one individual: identity, people,
  meetings, cooking, trips, decisions, and a weekly digest plus
  follow-up tracker to keep them coordinated.
primitives:
  - action-item
  - atlas
  - content-studio
  - decision
  - decision-companion
  - efforts
  - follow-up-tracker
  - identity
  - library
  - meal-planning
  - meeting
  - people
  - personal-coordinator
  - planning
  - recipe
  - trip-doc
  - trip-prep
  - trips
  - weekly-digest
variables:
  recipe_name: personal
  owner_name: ""
  owner_pronouns: ""
  owner_role: ""
  owner_timezone: ""
# Default agent bindings (RFC-0004 / wiki-agents PR-7). Each binding's
# ``runs:`` list names operations the recipe's ``primitives:`` closure
# already installs — the PR-3 closure-walk validator (CT-3/4/5) enforces
# this at recipe-load.
#
# ``decision-companion`` ships installed (in ``primitives:`` above) but
# unbound at v1; ``wiki agents`` shows ``OPERATIONS=—`` for it.
# Reserved for a future ``decision-review`` operation.
agents:
  personal-coordinator:
    runs:
      - weekly-digest
      - follow-up-tracker
      - meal-planning
