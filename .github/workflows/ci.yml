name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install ripgrep
        # `wiki search` shells out to ripgrep; the tests under
        # `tests/unit/test_search.py` and `tests/integration/test_wiki_search.py`
        # skip when `rg` is absent (per `shutil.which("rg")` guards).
        # Installing it here keeps the full search suite on the CI
        # critical path rather than silently skipped.
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Install package and dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff check)
        run: ruff check llm_wiki_kit tests

      - name: Format check (ruff format)
        run: ruff format --check llm_wiki_kit tests

      - name: Type check (mypy)
        run: mypy llm_wiki_kit tests

      - name: Run tests (pytest)
        # `not eval` excludes tests under tests/evals/ — those run in
        # the separate evals.yml workflow because they invoke the
        # `claude` CLI and consume Anthropic API budget.
        run: pytest -m 'not slow and not eval'
