# Research Providers Configuration
#
# The research orchestrator (skills/shared/research/SKILL.md) reads this file to know
# which providers are enabled and what each is good at. To enable a provider:
#   1. Set enabled: true
#   2. Set the API-key env var on your machine (or in your shell config)
#   3. Optionally adjust the model / endpoint if the provider's defaults change
#
# See docs/research-providers/{provider}.md for per-provider details.

research_providers:

  # Perplexity — current-state web research with citations.
  # Strong for: product comparisons, local services, how-to questions,
  # travel planning, recent news (e.g., school policy changes).
  # Cost: low. The most-used research provider for family research.
  # See docs/research-providers/perplexity.md
  perplexity:
    enabled: false
    api_key_env: PERPLEXITY_API_KEY
    endpoint: https://api.perplexity.ai/chat/completions
    model: sonar-pro            # sonar-pro | sonar | sonar-deep-research
    strengths:
      - current_web_state
      - cited_factual_lookup
      - product_comparison
      - local_services
    cost_signal: low

  # Semantic Scholar — academic literature, citation graphs, paper search.
  # Strong for: medical research with peer-reviewed evidence, educational
  # deep-dives when a family member is researching a topic.
  # Cost: free.
  # See docs/research-providers/semantic-scholar.md
  semantic_scholar:
    enabled: false
    api_key_env: SEMANTIC_SCHOLAR_API_KEY    # optional but increases rate limits
    endpoint: https://api.semanticscholar.org/graph/v1
    strengths:
      - academic_papers
      - peer_reviewed_evidence
      - medical_literature
      - educational_deep_dive
    cost_signal: free

  # Gemini Deep Research — long-form exhaustive synthesis.
  # Family-variant default: disabled. Most family research efforts don't need
  # the depth (or cost) of Gemini Deep Research. Enable case-by-case for major
  # decisions — multi-year financial planning, school enrollment for multiple
  # kids, complex medical workups.
  # Cost: high.
  # See docs/research-providers/gemini.md
  gemini:
    enabled: false
    api_key_env: GOOGLE_API_KEY
    endpoint: https://generativelanguage.googleapis.com/v1beta/models
    model: gemini-2.5-pro
    strengths:
      - long_form_synthesis
      - exhaustive_landscape
      - strategic_analysis
    cost_signal: high
