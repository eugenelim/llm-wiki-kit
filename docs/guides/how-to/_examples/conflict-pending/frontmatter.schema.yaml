# frontmatter.schema.yaml — the contract every wiki page declares
#
# Vault: conflict-pending
# Recipe: personal
#
# Every page under wiki/ has YAML frontmatter that conforms to this
# schema. The page-kind axis is two orthogonal facets: `genre` (a fixed,
# generic vocabulary of nine document shapes, hand-maintained below) and
# `subtype` (the specific form). Content-type primitives extend the
# `subtypes` and `fields` sections via managed regions; the kit owns the
# inside of each `# BEGIN MANAGED: id` / `# END MANAGED: id` block, your
# edits outside the markers survive. `genre` is fixed, not growable, so it
# is a baseline enum rather than a managed region.
#
# `workspaces:` (see `fields:` below) opts a note into one or more
# workspace lenses: list the lens names a note belongs to, e.g.
# `workspaces: [research, content-studio]`. It is a discoverable
# convention — the kit does not validate the values — that Obsidian Bases
# views (`.base`) filter on.

required:
  - genre
  - subtype
  - status
  - provenance
  - created
  - modified

# Allowed values for `genre:` — the fixed, generic nine-shape vocabulary
# (RFC-0009 / ADR-0011). Fixed, not growable: content-type primitives add
# `subtype` values, never genres, so this is a hand-maintained baseline
# enum, not a managed region.
genres:
  - note
  - record
  - update
  - decision
  - reference
  - profile
  - log
  - contract
  - moc

# Allowed values for `subtype:` — the controlled, growable specific form
# that refines `genre`. Content-type primitives append to this list.
subtypes:
  # BEGIN MANAGED: subtype
  - action-item
  - decision-record
  - recipe
  - meeting
  - trip
  # END MANAGED: subtype

# Allowed values for `status:`. Most pages start `active`; archive when
# the underlying thing is no longer relevant; draft for in-progress
# pages; someday for deferred-but-not-abandoned pages (excluded from
# active views, not archived).
statuses:
  - active
  - draft
  - archived
  - someday

# Allowed values for `provenance:`.
provenance:
  - extracted    # verbatim from a source; cite in a footnote
  - synthesized  # agent-written across multiple sources / prior pages
  - mixed        # both

# Field-level schema. The baseline below covers every page; content-type
# primitives append subtype-scoped fields inside the managed region.
fields:
  genre:
    type: string
  subtype:
    type: string
  status:
    type: string
  provenance:
    type: string
  created:
    type: date
    format: YYYY-MM-DD
  modified:
    type: date
    format: YYYY-MM-DD
  tags:
    type: list
    items: string
  source:
    type: string
    optional: true
  # Container / hub membership (RFC-0009): wikilink(s) to the parent
  # container or hub a page belongs to. Optional and universal — every
  # page may carry it — so it lives in the baseline `fields:` block.
  parent:
    type: list
    items: string
    optional: true
  # Membership axis for workspace lenses (RFC-0008). Optional and
  # universal — every page may carry it — so it lives in the baseline
  # `fields:` block, not a content-type managed region.
  workspaces:
    type: list
    items: string
    optional: true
  # BEGIN MANAGED: fields
  action_item_owner:
    type: string
    when: subtype == action-item
  action_item_due:
    type: date
    format: YYYY-MM-DD
    optional: true
    when: subtype == action-item
  action_item_state:
    type: string
    when: subtype == action-item
  action_item_source:
    type: string
    optional: true
    when: subtype == action-item
  decision_date:
    type: date
    format: YYYY-MM-DD
    when: subtype == decision-record
  decision_owner:
    type: string
    when: subtype == decision-record
  decision_status:
    type: string
    when: subtype == decision-record
  decision_context:
    type: string
    optional: true
    when: subtype == decision-record
  decision_alternatives:
    type: list
    items: string
    optional: true
    when: subtype == decision-record
  decision_supersedes:
    type: string
    optional: true
    when: subtype == decision-record
  recipe_servings:
    type: string
    optional: true
    when: subtype == recipe
  recipe_prep_time:
    type: string
    optional: true
    when: subtype == recipe
  recipe_cook_time:
    type: string
    optional: true
    when: subtype == recipe
  recipe_dietary:
    type: list
    items: string
    optional: true
    when: subtype == recipe
  meeting_date:
    type: date
    format: YYYY-MM-DD
    when: subtype == meeting
  meeting_attendees:
    type: list
    items: string
    when: subtype == meeting
  meeting_decisions:
    type: list
    items: string
    optional: true
    when: subtype == meeting
  meeting_follow_ups:
    type: list
    items: string
    optional: true
    when: subtype == meeting
  trip_destination:
    type: string
    when: subtype == trip
  trip_start_date:
    type: date
    format: YYYY-MM-DD
    when: subtype == trip
  trip_end_date:
    type: date
    format: YYYY-MM-DD
    when: subtype == trip
  trip_travelers:
    type: list
    items: string
    when: subtype == trip
  trip_status:
    type: string
    when: subtype == trip
  # END MANAGED: fields
